<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ridera — CDRRMO Dasmariñas Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f12 0%, #1a1a24 50%, #0f0f12 100%);
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: #16161b;
            border: 1px solid #27272e;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .login-header p {
            font-size: 13px;
            color: #a1a1a9;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 12px;
            font-weight: 700;
            color: #a1a1a9;
            text-transform: uppercase;
            letter-spacing: 0.07em;
        }

        .form-input {
            background: #1f1f26;
            border: 1px solid #27272e;
            border-radius: 9px;
            padding: 11px 14px;
            color: #e4e4e7;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .form-input::placeholder {
            color: #6f6f78;
        }

        .form-input:focus {
            border-color: #3b82f6;
            background: #252530;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .error-message {
            font-size: 12px;
            color: #fca5a5;
            display: none;
            margin-top: -4px;
        }

        .error-message.show {
            display: block;
        }

        .login-btn {
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            border: none;
            border-radius: 9px;
            padding: 11px 16px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-btn i {
            font-size: 13px;
        }

        .login-status {
            font-size: 12px;
            color: #a1a1a9;
            text-align: center;
            margin-top: 4px;
            min-height: 16px;
        }

        .login-status.loading {
            color: #3b82f6;
        }

        .login-status.error {
            color: #fca5a5;
        }

        .login-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #27272e;
            text-align: center;
            font-size: 12px;
            color: #6f6f78;
        }

        .demo-info {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
            font-size: 12px;
            line-height: 1.5;
        }

        .demo-info strong {
            color: #93c5fd;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 20px;
            }

            .login-logo {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <h1>Ridera</h1>
                <p>ADMIN</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input id="username" class="form-input" type="text" name="username"
                        placeholder="Enter your username" autocomplete="username" required />
                    <div class="error-message" id="usernameError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input id="password" class="form-input" type="password" name="password"
                        placeholder="Enter your password" autocomplete="current-password" required />
                    <div class="error-message" id="passwordError"></div>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <span id="btnIcon"><i class="fas fa-right-to-bracket"></i></span>
                    <span id="btnText">Sign In</span>
                </button>

                <div class="login-status" id="loginStatus"></div>
            </form>

            <div class="login-footer">
                <div style="margin-bottom:12px">administrator.</div>
                <div style="color:#515158">© 2026 Ridera Emergency Response · v1.0</div>
            </div>

            <script>
                'use strict';

                const form = document.getElementById('loginForm');
                const usernameInput = document.getElementById('username');
                const passwordInput = document.getElementById('password');
                const submitBtn = document.getElementById('submitBtn');
                const btnIcon = document.getElementById('btnIcon');
                const btnText = document.getElementById('btnText');
                const loginStatus = document.getElementById('loginStatus');

                // Prefill from localStorage (optional)
                const savedUsername = localStorage.getItem('rideraUsername');
                if (savedUsername) usernameInput.value = savedUsername;

                // Clear errors on input
                [usernameInput, passwordInput].forEach(input => {
                    input.addEventListener('input', () => {
                        input.classList.remove('error');
                        document.getElementById(input.id + 'Error').classList.remove('show');
                        loginStatus.textContent = '';
                        loginStatus.className = '';
                    });
                });

                // Form submission
                form.addEventListener('submit', async e => {
                    e.preventDefault();

                    const username = usernameInput.value.trim();
                    const password = passwordInput.value;

                    // Validation
                    if (!username) {
                        usernameInput.classList.add('error');
                        document.getElementById('usernameError').textContent = 'Username required';
                        document.getElementById('usernameError').classList.add('show');
                        return;
                    }

                    if (!password) {
                        passwordInput.classList.add('error');
                        document.getElementById('passwordError').textContent = 'Password required';
                        document.getElementById('passwordError').classList.add('show');
                        return;
                    }

                    // Loading state
                    submitBtn.disabled = true;
                    btnIcon.innerHTML = '<span class="spinner"></span>';
                    btnText.textContent = 'Signing in...';
                    loginStatus.textContent = 'Authenticating...';
                    loginStatus.className = 'loading';

                    try {
                        // POST to server
                        const response = await fetch('/api/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });

                        const data = await response.json();

                        if (response.ok && data.success) {
                            // Save username for next time
                            localStorage.setItem('rideraUsername', username);

                            // Success
                            loginStatus.textContent = `Welcome, ${data.user.username}! Redirecting...`;
                            loginStatus.className = '';

                            // Redirect based on role
                            setTimeout(() => {
                                window.location.href = data.redirectTo || '/';
                            }, 800);
                        } else {
                            // Auth failed
                            submitBtn.disabled = false;
                            btnIcon.innerHTML = '<i class="fas fa-right-to-bracket"></i>';
                            btnText.textContent = 'Sign In';
                            loginStatus.textContent = data.error || 'Login failed';
                            loginStatus.className = 'error';

                            // Highlight password field
                            passwordInput.classList.add('error');
                            document.getElementById('passwordError').textContent = 'Invalid credentials';
                            document.getElementById('passwordError').classList.add('show');
                        }
                    } catch (err) {
                        console.error('Login error:', err);
                        submitBtn.disabled = false;
                        btnIcon.innerHTML = '<i class="fas fa-right-to-bracket"></i>';
                        btnText.textContent = 'Sign In';
                        loginStatus.textContent = 'Network error. Please try again.';
                        loginStatus.className = 'error';
                    }
                });

                // Focus on load
                setTimeout(() => usernameInput.focus(), 100);

                // Enter key support
                passwordInput.addEventListener('keypress', e => {
                    if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
                });
            </script>
</body>

</html>
